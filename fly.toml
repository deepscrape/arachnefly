# fly.toml app configuration file generated for arachnefly on 2025-04-01T17:42:29+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'arachnefly'
primary_region = 'iad'

[build]
dockerfile = 'Dockerfile'

[env]
FILE_FIREBASE_CREDENTIALS = 'libnet-d76db-949683c2222d.json'
FLY_APP = 'crawler4ai'
PORT = '8080'
SERVER_ADRESS = '0.0.0.0'

# [http_response]
[[services]]
protocol = 'tcp'
# force_https = true
internal_port = 8080
auto_stop_machines = 'stop'
auto_start_machines = true
min_machines_running = 0
processes = ['app']

[[services.ports]]
port = 80
handlers = ['http']

[[services.ports]]
port = 443
handlers = ['tls', 'http']

[services.concurrency]
type = "connections"
soft_limit = 20
hard_limit = 25
# type = 'connections' # Scale based on concurrent connections
# hard_limit = 120     # Max connections per Machine before rejection
# soft_limit = 100     # Target connections before routing to other Machines

# [[services]]
# protocol = 'tcp'
# internal_port = 9090

# [[services.ports]]
# port = 9090
# handlers = ['http']

# [services.concurrency]
# type = "connections"
# hard_limit = 25
# soft_limit = 20

[[vm]]
# size = 'shared-cpu-1x'
memory = "512mb"
cpu_kind = 'shared'
cpus = 2
# gpus = 1
# gpu_kind = "a10"


[metrics]
port = 8080
path = '/metrics'
